<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一德農園銷售數據</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        header .container {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 300;
        }

        .last-updated {
            margin-top: 1rem;
            font-size: 0.875rem;
            opacity: 0.7;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.75rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card:hover::before {
            transform: scaleY(1);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .stat-change {
            font-size: 0.875rem;
            color: var(--success);
            font-weight: 500;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .section-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: white;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .date-card {
            background: var(--card);
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .date-card:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .date-card.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
        }

        .date-card.active .date-label,
        .date-card.active .date-amount {
            color: white;
        }

        .date-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .date-day {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .date-amount {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* Transaction Details */
        .transaction-details {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .transaction-details.active {
            display: block;
        }

        .transaction-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        .transaction-table thead {
            background: var(--bg);
            border-radius: 8px;
        }

        .transaction-table th {
            padding: 1rem;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .transaction-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9375rem;
        }

        .transaction-table tbody tr {
            transition: background 0.2s;
        }

        .transaction-table tbody tr:hover {
            background: var(--bg);
        }

        .transaction-table tbody tr:last-child td {
            border-bottom: none;
        }

        .amount-cell {
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #dc2626;
            margin-bottom: 1.5rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .calendar-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.75rem;
            }

            .transaction-table {
                font-size: 0.875rem;
            }

            .transaction-table th,
            .transaction-table td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>一德農園銷售數據</h1>
            <p class="subtitle">即時業績追蹤與分析</p>
            <p class="last-updated" id="lastUpdated">載入中...</p>
        </div>
    </header>

    <div class="container">
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>正在載入數據...</p>
        </div>

        <div id="errorState" style="display: none;"></div>

        <div id="mainContent" style="display: none;">
            <!-- Summary Statistics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">今日收入</div>
                    <div class="stat-value" id="todayRevenue">NT$ 0</div>
                    <div class="stat-change" id="todayChange"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">本週收入</div>
                    <div class="stat-value" id="weekRevenue">NT$ 0</div>
                    <div class="stat-change" id="weekChange"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">本月收入</div>
                    <div class="stat-value" id="monthRevenue">NT$ 0</div>
                    <div class="stat-change" id="monthChange"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最大客戶</div>
                    <div class="stat-value" id="topCustomer" style="font-size: 1.5rem;">-</div>
                    <div class="stat-change" id="topCustomerAmount"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最暢銷項目</div>
                    <div class="stat-value" id="topProduct" style="font-size: 1.5rem;">-</div>
                    <div class="stat-change" id="topProductCount"></div>
                </div>
            </div>

            <!-- Date Selection -->
            <div class="section-header">
                <h2 class="section-title">每日明細</h2>
                <div class="section-actions">
                    <button class="btn btn-secondary" onclick="refreshData()">🔄 重新載入</button>
                </div>
            </div>

            <div class="calendar-grid" id="dateGrid"></div>

            <!-- Transaction Details -->
            <div class="transaction-details" id="transactionDetails">
                <h3 id="selectedDateTitle">選擇日期以查看明細</h3>
                <table class="transaction-table">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>客戶</th>
                            <th>項目</th>
                            <th>數量</th>
                            <th>單價</th>
                            <th>總計</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Global data storage
        let rawData = [];
        let processedData = {
            byDate: {},
            stats: {}
        };

        // Configuration - 請將此處改為你的 Google Sheets CSV URL
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwAVfRX9NTFtNBOu-9DjUA_CTifMrCRJmGDvqAhx8sQHK_oWtHFs8ctkjADK73QmV9saRtDBw--1Cb/pub?output=csv';

        // Fetch and parse CSV data
        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('無法載入數據');
                
                const text = await response.text();
                parseCSV(text);
                processData();
                renderDashboard();
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('lastUpdated').textContent = `最後更新：${new Date().toLocaleString('zh-TW')}`;
            } catch (error) {
                showError(error.message);
            }
        }

        // Parse CSV
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            
            rawData = [];
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const row = {};
                    headers.forEach((header, index) => {
                        row[header] = values[index].trim();
                    });
                    rawData.push(row);
                }
            }
        }

        // Parse CSV line (handles quoted fields)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        // Process data into useful structures
        function processData() {
            processedData.byDate = {};
            const customerTotals = {};
            const productCounts = {};
            
            rawData.forEach(row => {
                // Extract fields based on your column names
                const timestamp = row['時間戳記'] || row['Timestamp'] || '';
                const customer = row['顧客名字'] || '';
                const product = row['賣了什麼'] || '';
                const quantity = row['幾包/幾盒/幾斤/幾顆'] || '';
                const price = parseFloat(row['單價金額'] || 0);
                const note = row['備註'] || '';
                const total = parseFloat(row['總計'] || 0);
                
                // Parse date
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) return;
                
                const dateKey = date.toISOString().split('T')[0];
                
                // Group by date
                if (!processedData.byDate[dateKey]) {
                    processedData.byDate[dateKey] = {
                        transactions: [],
                        total: 0
                    };
                }
                
                processedData.byDate[dateKey].transactions.push({
                    time: date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
                    customer,
                    product,
                    quantity,
                    price,
                    total,
                    note
                });
                
                processedData.byDate[dateKey].total += total;
                
                // Track customer totals
                customerTotals[customer] = (customerTotals[customer] || 0) + total;
                
                // Track product counts
                productCounts[product] = (productCounts[product] || 0) + 1;
            });
            
            // Calculate stats
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const monthAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            processedData.stats = {
                today: processedData.byDate[today]?.total || 0,
                week: Object.keys(processedData.byDate)
                    .filter(date => date >= weekAgo)
                    .reduce((sum, date) => sum + processedData.byDate[date].total, 0),
                month: Object.keys(processedData.byDate)
                    .filter(date => date >= monthAgo)
                    .reduce((sum, date) => sum + processedData.byDate[date].total, 0),
                topCustomer: Object.entries(customerTotals).sort((a, b) => b[1] - a[1])[0] || ['無', 0],
                topProduct: Object.entries(productCounts).sort((a, b) => b[1] - a[1])[0] || ['無', 0]
            };
        }

        // Render dashboard
        function renderDashboard() {
            const stats = processedData.stats;
            
            // Update stats cards
            document.getElementById('todayRevenue').textContent = `NT$ ${stats.today.toLocaleString()}`;
            document.getElementById('weekRevenue').textContent = `NT$ ${stats.week.toLocaleString()}`;
            document.getElementById('monthRevenue').textContent = `NT$ ${stats.month.toLocaleString()}`;
            document.getElementById('topCustomer').textContent = stats.topCustomer[0];
            document.getElementById('topCustomerAmount').textContent = `累計 NT$ ${stats.topCustomer[1].toLocaleString()}`;
            document.getElementById('topProduct').textContent = stats.topProduct[0];
            document.getElementById('topProductCount').textContent = `售出 ${stats.topProduct[1]} 次`;
            
            // Render date grid (last 30 days)
            const dateGrid = document.getElementById('dateGrid');
            dateGrid.innerHTML = '';
            
            const dates = Object.keys(processedData.byDate).sort().reverse().slice(0, 30);
            
            dates.forEach(dateKey => {
                const dateData = processedData.byDate[dateKey];
                const date = new Date(dateKey);
                
                const card = document.createElement('div');
                card.className = 'date-card';
                card.innerHTML = `
                    <div class="date-label">${date.toLocaleDateString('zh-TW', { weekday: 'short' })}</div>
                    <div class="date-day">${date.getDate()}</div>
                    <div class="date-amount">NT$ ${dateData.total.toLocaleString()}</div>
                `;
                card.onclick = () => showDateDetails(dateKey);
                dateGrid.appendChild(card);
            });
        }

        // Show details for a specific date
        function showDateDetails(dateKey) {
            const dateData = processedData.byDate[dateKey];
            const date = new Date(dateKey);
            
            // Update active state
            document.querySelectorAll('.date-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Update title
            document.getElementById('selectedDateTitle').textContent = 
                `${date.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })} - 總計 NT$ ${dateData.total.toLocaleString()}`;
            
            // Update table
            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = '';
            
            dateData.transactions.forEach(tx => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${tx.time}</td>
                    <td><strong>${tx.customer}</strong></td>
                    <td>${tx.product}</td>
                    <td>${tx.quantity}</td>
                    <td class="amount-cell">NT$ ${tx.price.toLocaleString()}</td>
                    <td class="amount-cell">NT$ ${tx.total.toLocaleString()}</td>
                    <td>${tx.note}</td>
                `;
                tbody.appendChild(row);
            });
            
            // Show details section
            document.getElementById('transactionDetails').classList.add('active');
            document.getElementById('transactionDetails').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Show error
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            const errorState = document.getElementById('errorState');
            errorState.innerHTML = `<div class="error"><strong>錯誤：</strong> ${message}</div>`;
            errorState.style.display = 'block';
        }

        // Refresh data
        function refreshData() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';
            fetchData();
        }

        // Initialize
        fetchData();

        // Auto-refresh every 5 minutes
        setInterval(refreshData, 5 * 60 * 1000);
    </script>
</body>
</html>
