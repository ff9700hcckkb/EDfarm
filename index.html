<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一德農園銷售數據</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #f8fafc;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 1rem;
}

/* 表格 */
.transaction-table {
  width: 100%;
  border-collapse: collapse;
}

.transaction-table td,
.transaction-table th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

/* 🔴 項目紅色 */
.product-cell {
  color: #dc2626;
  font-weight: 600;
}

/* 手機版 */
@media (max-width: 768px) {

  .transaction-table,
  .transaction-table tbody,
  .transaction-table tr,
  .transaction-table td {
    display: block;
    width: 100%;
  }

  .transaction-table thead {
    display: none;
  }

  .transaction-table tr {
    background: white;
    border-radius: 12px;
    margin-bottom: 12px;
    padding: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .transaction-table td {
    display: flex;
    justify-content: space-between;
    text-align: right;
  }

  .transaction-table td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #666;
    text-align: left;
  }

  /* ⭐ 修正重點：項目也靠右 */
  .transaction-table td:nth-child(3) {
    display: flex;
    text-align: right;
  }

}
</style>
</head>

<body>

<div class="container">

<h2>銷售明細</h2>

<table class="transaction-table">
<thead>
<tr>
<th>時間</th>
<th>客戶</th>
<th>項目</th>
<th>數量</th>
<th>單價</th>
<th>總計</th>
<th>備註</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>

const SHEET_URL = "你的CSV網址";

function parseMoney(v){
  return parseFloat(String(v||0).replace(/,/g,''))||0;
}

function fetchData(){
  fetch(SHEET_URL)
  .then(res=>res.text())
  .then(csv=>{
    Papa.parse(csv,{
      header:true,
      complete:(res)=>{
        render(res.data);
      }
    })
  })
}

function render(data){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(row=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
<td data-label="時間">${row["時間戳記"]||""}</td>
<td data-label="客戶">${row["顧客名字"]||""}</td>
<td data-label="項目" class="product-cell">${row["賣了什麼"]||""}</td>
<td data-label="數量">${row["幾包/幾盒/幾斤/幾顆"]||""}</td>
<td data-label="單價">NT$ ${parseMoney(row["單價金額"]).toLocaleString()}</td>
<td data-label="總計">NT$ ${parseMoney(row["總計"]).toLocaleString()}</td>
<td data-label="備註">${row["備註"]||""}</td>
`;

    tbody.appendChild(tr);
  })
}

fetchData();

</script>

</body>
</html>
